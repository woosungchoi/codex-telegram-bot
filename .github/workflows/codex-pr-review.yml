name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    name: Review PR
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Check Codex OAuth token
        id: codex-token
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
        run: |
          if [ -n "$CODEX_ACCESS_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when Codex OAuth token is unavailable
        if: ${{ steps.codex-token.outputs.configured != 'true' }}
        run: |
          {
            echo "### Codex PR Review"
            echo
            echo "Skipped because the repository secret \`CODEX_ACCESS_TOKEN\` is not configured."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Codex CLI
        id: codex-cli
        if: ${{ steps.codex-token.outputs.configured == 'true' }}
        run: |
          set +e
          version="$(node -p "require('./package.json').devDependencies['@openai/codex']")"
          npm install -g "@openai/codex@$version"
          status=$?
          if [ "$status" -eq 0 ] && command -v codex >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Codex PR Review"
              echo
              echo "Skipped because the Codex CLI package could not be installed."
              echo
              echo "Package: \`@openai/codex@$version\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Login with Codex OAuth token
        id: codex-login
        if: ${{ steps.codex-cli.outputs.available == 'true' }}
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          mkdir -p "$CODEX_HOME"
          if printf '%s' "$CODEX_ACCESS_TOKEN" | codex login --with-access-token && codex login status; then
            echo "authenticated=true" >> "$GITHUB_OUTPUT"
          else
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Codex PR Review"
              echo
              echo "Skipped because Codex OAuth login failed. Refresh or remove \`CODEX_ACCESS_TOKEN\` to keep this optional reviewer healthy."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Review PR
        if: ${{ steps.codex-login.outputs.authenticated == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_HOME: ${{ runner.temp }}/codex-home
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -o pipefail
          git fetch origin "$BASE_REF" --depth=1
          {
            echo "## Codex PR Review"
            echo
            codex \
              --sandbox read-only \
              --ask-for-approval never \
              review \
              --base "origin/$BASE_REF" \
              "Focus on correctness bugs, security risks, regressions, and missing tests. Keep the review concise and actionable."
          } | tee codex-pr-review.md
          node scripts/github_comment_upsert.mjs "$PR_NUMBER" "pr-review" codex-pr-review.md
