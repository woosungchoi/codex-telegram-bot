name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    name: Review PR
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Codex OAuth token
        id: codex-token
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
        run: |
          if [ -n "$CODEX_ACCESS_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when Codex OAuth token is unavailable
        if: ${{ steps.codex-token.outputs.configured != 'true' }}
        run: |
          {
            echo "### Codex PR Review"
            echo
            echo "Skipped because the repository secret \`CODEX_ACCESS_TOKEN\` is not configured."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Codex CLI
        if: ${{ steps.codex-token.outputs.configured == 'true' }}
        run: npm install -g @openai/codex@0.130.0

      - name: Login with Codex OAuth token
        if: ${{ steps.codex-token.outputs.configured == 'true' }}
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          mkdir -p "$CODEX_HOME"
          printf '%s' "$CODEX_ACCESS_TOKEN" | codex login --with-access-token
          codex login status

      - name: Review PR
        if: ${{ steps.codex-token.outputs.configured == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_HOME: ${{ runner.temp }}/codex-home
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -o pipefail
          git fetch origin "$BASE_REF" --depth=1
          {
            echo "## Codex PR Review"
            echo
            codex \
              --sandbox read-only \
              --ask-for-approval never \
              review \
              --base "origin/$BASE_REF" \
              "Focus on correctness bugs, security risks, regressions, and missing tests. Keep the review concise and actionable."
          } | tee codex-pr-review.md
          node scripts/github_comment_upsert.mjs "$PR_NUMBER" "pr-review" codex-pr-review.md
