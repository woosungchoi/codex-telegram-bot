name: Codex Dependency Update

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Test Latest Codex Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.CODEX_AUTOMATION_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Check latest versions
        id: version
        run: |
          current_sdk="$(node -p "require('./package.json').dependencies['@openai/codex-sdk']")"
          current_cli="$(node -p "require('./package.json').devDependencies['@openai/codex']")"
          latest_sdk="$(npm view @openai/codex-sdk version 2>/dev/null || true)"
          latest_cli="$(npm view @openai/codex version 2>/dev/null || true)"
          if [ -z "$latest_sdk" ]; then
            latest_sdk="$current_sdk"
            sdk_available=false
          else
            sdk_available=true
          fi
          if [ -z "$latest_cli" ]; then
            latest_cli="$current_cli"
            cli_available=false
          else
            cli_available=true
          fi
          {
            echo "current_sdk=$current_sdk"
            echo "latest_sdk=$latest_sdk"
            echo "current_cli=$current_cli"
            echo "latest_cli=$latest_cli"
            echo "sdk_available=$sdk_available"
            echo "cli_available=$cli_available"
          } >> "$GITHUB_OUTPUT"
          if [ "$sdk_available" != true ] || [ "$cli_available" != true ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Codex Dependency Update"
              echo
              echo "Skipped because one or more Codex npm packages are currently unavailable from the registry."
              echo
              echo "- \`@openai/codex-sdk\` available: \`$sdk_available\`"
              echo "- \`@openai/codex\` available: \`$cli_available\`"
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$current_sdk" = "$latest_sdk" ] && [ "$current_cli" = "$latest_cli" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when already current
        if: ${{ steps.version.outputs.changed != 'true' }}
        run: echo "Codex packages are already current."

      - name: Update packages
        if: ${{ steps.version.outputs.changed == 'true' }}
        run: |
          if [ "${{ steps.version.outputs.sdk_available }}" = true ]; then
            npm install "@openai/codex-sdk@${{ steps.version.outputs.latest_sdk }}" --save-exact
          fi
          if [ "${{ steps.version.outputs.cli_available }}" = true ]; then
            npm install "@openai/codex@${{ steps.version.outputs.latest_cli }}" --save-dev --save-exact
          fi

      - name: Verify updated packages
        if: ${{ steps.version.outputs.changed == 'true' }}
        run: |
          npm run check
          npm test
          if [ "${{ steps.version.outputs.cli_available }}" = true ]; then
            npm install -g "@openai/codex@${{ steps.version.outputs.latest_cli }}"
            codex --version
          else
            echo "Skipping Codex CLI smoke test because @openai/codex is unavailable."
          fi

      - name: Create or update pull request
        if: ${{ steps.version.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.CODEX_AUTOMATION_TOKEN || github.token }}
          BRANCH: automation/update-codex-packages
          LATEST_SDK: ${{ steps.version.outputs.latest_sdk }}
          CURRENT_SDK: ${{ steps.version.outputs.current_sdk }}
          LATEST_CLI: ${{ steps.version.outputs.latest_cli }}
          CURRENT_CLI: ${{ steps.version.outputs.current_cli }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No package file changes after update."
            exit 0
          fi
          git commit -m "Update Codex packages"
          git push --force origin "$BRANCH"
          cat > pr-body.md <<BODY
          Automated Codex package update.

          - \`@openai/codex-sdk\`: \`$CURRENT_SDK\` -> \`$LATEST_SDK\`
          - \`@openai/codex\`: \`$CURRENT_CLI\` -> \`$LATEST_CLI\`

          Availability:

          - \`@openai/codex-sdk\`: \`${{ steps.version.outputs.sdk_available }}\`
          - \`@openai/codex\`: \`${{ steps.version.outputs.cli_available }}\`

          Verification run in this workflow:

          - \`npm run check\`
          - \`npm test\`
          - \`codex --version\` when \`@openai/codex\` is available
          BODY
          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Update Codex packages" \
              --body-file pr-body.md
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "Update Codex packages" \
              --body-file pr-body.md
          fi
